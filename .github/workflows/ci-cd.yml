name: CI/CD Pipeline

on:
  push:
    branches: [ main, improvement-dockerfile ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Тестирование кода
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'
        
    - name: Install dependencies
      run: go mod download
      
    - name: Check code format
      run: |
        if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
          echo "Code is not formatted. Run: gofmt -w ."
          gofmt -l .
          exit 1
        fi
        
    - name: Check for errors
      run: go vet ./...
      
    - name: Create test database
      run: |
        sqlite3 tracker.db "CREATE TABLE IF NOT EXISTS parcel (
            number INTEGER PRIMARY KEY AUTOINCREMENT,
            client INTEGER NOT NULL,
            status TEXT NOT NULL,
            address TEXT NOT NULL,
            created_at TEXT NOT NULL
        );"
        
    - name: Run tests
      run: go test -v ./...

  # Job 2: Публикация в DockerHub при создании тегов
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Get tag name
      id: tag
      run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        
    - name: Create database for Docker
      run: |
        sqlite3 tracker.db "CREATE TABLE IF NOT EXISTS parcel (
            number INTEGER PRIMARY KEY AUTOINCREMENT,
            client INTEGER NOT NULL,
            status TEXT NOT NULL,
            address TEXT NOT NULL,
            created_at TEXT NOT NULL
        );"
        
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/42-docker-tracker:${{ steps.tag.outputs.tag }}
          ${{ secrets.DOCKERHUB_USERNAME }}/42-docker-tracker:latest